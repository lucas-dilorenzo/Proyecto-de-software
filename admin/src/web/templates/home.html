{% endblock%} {% block body %} MAPA
<!-- MAPA -->
<label style="margin-top: auto"></label>
<div id="map"></div>
<br />
<!-- FIN MAPA -->

<script>
  // Obtener todos los sitios históricos
  try {
    var sites = {{ sites|safe }};
    console.log("Sitios cargados:", sites);
    console.log("Número total de sitios:", sites ? sites.length : 0);
  } catch (error) {
    console.error("Error al cargar sitios:", error);
    var sites = [];
  }

  // Coordenadas por defecto (centro de Argentina aproximadamente)
  var defaultLat = -34.6118;
  var defaultLng = -58.3960;
  var mapCenter = [defaultLat, defaultLng];
  var zoomLevel = 6;

  // Inicializar mapa
  console.log("Inicializando mapa...");
  try {
    var map = L.map("map").setView(mapCenter, zoomLevel);
    console.log("Mapa inicializado correctamente");

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
    }).addTo(map);
    console.log("Capa de tiles añadida");

    // Añadir marcadores para todos los sitios históricos
    if (sites && Array.isArray(sites) && sites.length > 0) {
      console.log("Procesando sitios para marcadores...");
      var validSites = [];

      sites.forEach(function(site, index) {
        console.log(`Sitio ${index + 1}:`, site.name,
                   `Lat: ${site.latitude}, Lng: ${site.longitude},
                   Visible: ${site.visibility}`);

        // Solo mostrar sitios visibles con coordenadas válidas
        if (site.visibility && site.latitude != null && site.longitude != null &&
            !isNaN(site.latitude) && !isNaN(site.longitude)) {

          var marker = L.marker([parseFloat(site.latitude), parseFloat(site.longitude)])
            .addTo(map)
            .bindPopup(`
              <div>
                <h6><strong>${site.name}</strong></h6>
                ${site.city ? `<p>Ciudad: ${site.city}</p>` : ''}
                ${site.province ? `<p>Provincia: ${site.province}</p>` : ''}
                ${site.description_short ? `<p>${site.description_short}</p>` : ''}
              </div>
            `);

          validSites.push(site);
          console.log(`Marcador añadido para: ${site.name}`);
        } else {
          console.warn(`Sitio omitido (sin coordenadas o invisible):`, site.name);
        }
      });

      console.log(`Se añadieron ${validSites.length} marcadores de ${sites.length} sitios`);

      // Si hay múltiples sitios válidos, ajustar la vista para mostrar todos
      if (validSites.length > 1) {
        var group = new L.featureGroup();
        validSites.forEach(function(site) {
          group.addLayer(L.marker([parseFloat(site.latitude), parseFloat(site.longitude)]));
        });

        try {
          map.fitBounds(group.getBounds().pad(0.1));
          console.log("Vista ajustada para mostrar todos los marcadores");
        } catch (error) {
          console.warn("No se pudo ajustar la vista del mapa:", error);
        }
      } else if (validSites.length === 1) {
        // Si hay solo un sitio, centrar en él
        map.setView([parseFloat(validSites[0].latitude), parseFloat(validSites[0].longitude)], 12);
        console.log("Vista centrada en el único sitio disponible");
      }
    } else {
      console.log("No hay sitios para mostrar en el mapa");
    }
  } catch (error) {
    console.error("Error al inicializar el mapa:", error);
  }
</script>
{% endblock %}
