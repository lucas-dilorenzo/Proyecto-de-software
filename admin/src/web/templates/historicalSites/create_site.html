{% extends "layout.html" %} {% block head %}
<!-- Cargar Leaflet CSS primero -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- CSS Override QUIRÚRGICO - Solo neutralizar conflictos específicos -->
<style>
  /* ==========================================
     SOLUCIÓN QUIRÚRGICA: SOLO EL MAPA
     ========================================== */

  /* 1. SOLO neutralizar los conflictos específicos de Leaflet */

  /* Prevenir que Leaflet afecte los Bootstrap Icons */
  .bi::before {
    font-family: "bootstrap-icons" !important;
  }

  /* 2. Contenedor del mapa - AISLAMIENTO TOTAL */
  .leaflet-map-section {
    /* Crear contexto completamente aislado */
    contain: layout style paint;
    isolation: isolate;
    position: relative;
    margin-top: 15px;
    /* Resetear cualquier herencia problemática SOLO aquí */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      sans-serif;
  }

  .map-instructions {
    font-size: 0.875rem;
    color: #6c757d;
    margin-bottom: 10px;
    padding: 8px 12px;
    background-color: #e3f2fd;
    border-radius: 4px;
    border-left: 4px solid #1976d2;
    /* Volver a la fuente del proyecto SOLO para las instrucciones */
    font-family: Quicksand, sans-serif;
  }

  .map-container {
    position: relative;
    border: 2px solid #dee2e6;
    border-radius: 8px;
    overflow: hidden;
    background: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    z-index: 1;
  }

  #map {
    height: 350px;
    width: 100%;
    display: block;
    /* Importante: asegurar que el mapa no interfiera con el z-index del layout */
    position: relative;
    z-index: 1;
  }

  /* 3. Estilos SOLO para elementos dentro del contenedor del mapa */
  .leaflet-map-section .leaflet-container {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      sans-serif;
    font-size: 12px;
  }

  .leaflet-map-section .leaflet-control {
    font-family: inherit;
  }

  .leaflet-map-section .leaflet-popup-content {
    font-family: inherit;
  }

  /* 4. Prevenir que los elementos del mapa escapen y afecten el layout */
  .leaflet-map-section * {
    /* SOLO aplicar box-sizing dentro del contenedor del mapa */
    box-sizing: border-box;
  }

  /* 5. Estilos para el formulario - NO usar !important */
  .form-actions {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 2px solid #dee2e6;
  }

  /* 6. Asegurar que Leaflet no interfiera con elementos específicos de Bootstrap */

  /* Botones del formulario - preservar estilos Bootstrap */
  .form-actions .btn {
    font-family: inherit;
  }

  /* Inputs del formulario */
  .form-control {
    font-family: inherit;
  }

  /* Labels */
  .form-label {
    font-family: inherit;
  }

  /* 7. Z-index management para evitar conflictos con sidebar */
  .leaflet-map-section {
    /* Asegurar que el mapa esté por debajo del sidebar */
    z-index: auto;
  }

  .map-container {
    z-index: 1;
  }

  /* Prevenir que controles de Leaflet interfieran con el sidebar */
  .leaflet-control-container {
    z-index: 2;
  }
</style>
{% endblock %} {% block title %}Create Historical Site{% endblock %} {% block
body %}
<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <h1 class="mb-4 text-primary">
        <i class="bi bi-plus-circle me-2"></i>Create New Historical Site
      </h1>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="POST" action="{{ url_for('sites.create_site') }}">
            <div class="row">
              <!-- Primera columna -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="name" class="form-label">
                    <i class="bi bi-building me-1"></i>Name
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    required
                    placeholder="Enter the site name"
                  />
                </div>

                <div class="mb-3">
                  <label for="description_short" class="form-label">
                    <i class="bi bi-card-text me-1"></i>Short Description
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="description_short"
                    name="description_short"
                    required
                    placeholder="Brief description of the site"
                  />
                </div>

                <div class="mb-3">
                  <label for="city" class="form-label">
                    <i class="bi bi-geo-alt me-1"></i>City
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="city"
                    name="city"
                    required
                    placeholder="Enter the city"
                  />
                </div>

                <div class="mb-3">
                  <label for="province" class="form-label">
                    <i class="bi bi-map me-1"></i>Province
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="province"
                    name="province"
                    required
                    placeholder="Enter the province"
                  />
                </div>

                <div class="mb-3">
                  <label for="location" class="form-label">
                    <i class="bi bi-pin-map me-1"></i>Geographical Location
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="location"
                    name="location"
                    required
                    placeholder="Enter coordinates or location details"
                  />
                  <!-- Inputs ocultos para guardar coordenadas -->
                  <input type="hidden" id="lat" name="lat" />
                  <input type="hidden" id="lng" name="lng" />

                  <div class="leaflet-map-section">
                    <div class="map-instructions">
                      <i class="bi bi-info-circle me-1"></i>Click on the map to
                      select the exact location
                    </div>
                    <div class="map-container">
                      <div id="map"></div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Segunda columna -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="conservation_status" class="form-label">
                    <i class="bi bi-shield-check me-1"></i>Conservation Status
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="conservation_status"
                    name="conservation_status"
                    required
                    placeholder="Current conservation status"
                  />
                </div>

                <div class="mb-3">
                  <label for="year_declared" class="form-label">
                    <i class="bi bi-calendar-event me-1"></i>Year Declared
                  </label>
                  <input
                    type="number"
                    class="form-control"
                    id="year_declared"
                    name="year_declared"
                    required
                    min="1800"
                    max="2024"
                    placeholder="Year when it was declared"
                  />
                </div>

                <div class="mb-3">
                  <label for="category" class="form-label">
                    <i class="bi bi-tags me-1"></i>Category
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="category"
                    name="category"
                    required
                    placeholder="Site category"
                  />
                </div>

                <div class="mb-3">
                  <label for="registration_date" class="form-label">
                    <i class="bi bi-calendar3 me-1"></i>Registration Date
                  </label>
                  <input
                    type="date"
                    class="form-control"
                    id="registration_date"
                    name="registration_date"
                    required
                  />
                </div>

                <div class="mb-3">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="visibility"
                      name="visibility"
                      value="true"
                    />
                    <label class="form-check-label" for="visibility">
                      <i class="bi bi-eye me-1"></i>Make site visible to public
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Descripción detallada en toda la fila -->
            <div class="row">
              <div class="col-12">
                <div class="mb-4">
                  <label for="description" class="form-label">
                    <i class="bi bi-journal-text me-1"></i>Detailed Description
                  </label>
                  <textarea
                    class="form-control"
                    id="description"
                    name="description"
                    required
                    rows="4"
                    placeholder="Provide a detailed description of the historical site..."
                  ></textarea>
                </div>
              </div>
            </div>

            <!-- Botones de acción -->
            <div class="row">
              <div class="col-12">
                <div class="form-actions d-flex gap-2 justify-content-end">
                  <a
                    href="{{ url_for('sites.list_sites') }}"
                    class="btn btn-outline-secondary"
                  >
                    <i class="bi bi-arrow-left me-1"></i>Cancel
                  </a>
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Create Site
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Esperar a que el DOM esté completamente cargado
  document.addEventListener("DOMContentLoaded", function () {
    // Inicializar mapa con un pequeño retraso para evitar conflictos de CSS
    setTimeout(function () {
      var map = L.map("map").setView([-34.6037, -58.3816], 13); // Buenos Aires de ejemplo

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      var marker;

      // Evento click en mapa
      map.on("click", function (e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        if (marker) {
          map.removeLayer(marker);
        }
        marker = L.marker([lat, lng]).addTo(map);

        // Guardar valores en los inputs ocultos
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        // Opcional: actualizar el campo de ubicación con las coordenadas
        document.getElementById("location").value =
          lat.toFixed(6) + ", " + lng.toFixed(6);
      });

      // Forzar redimensionamiento del mapa después de la inicialización
      setTimeout(function () {
        map.invalidateSize();
      }, 100);
    }, 100);
  });
</script>
{% endblock %}
