{% extends "layout.html" %} {% block head %}
<link
  href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  rel="stylesheet"
/>
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
  integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
  crossorigin=""
/>
<script
  src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
  integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
  crossorigin=""
></script>
<style>
  #map {
    height: 400px;
    width: 100%;
    margin-top: 10px;
  }
</style>
{% endblock %} {% block title %}Crear Sitio Histórico{% endblock %} {% block
body %}
<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <h1 class="mb-4 text-primary">
        <i class="bi bi-plus-circle me-2"></i>Crear Nuevo Sitio Histórico
      </h1>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="POST" action="{{ url_for('sites.create_site') }}">
            <div class="row">
              <!-- Primera columna -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="name" class="form-label">
                    <i class="bi bi-building me-1"></i>Nombre
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    required
                    placeholder="Ingrese el nombre del sitio"
                  />
                </div>

                <div class="mb-3">
                  <label for="description_short" class="form-label">
                    <i class="bi bi-card-text me-1"></i>Descripción Corta
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="description_short"
                    name="description_short"
                    required
                    placeholder="Descripción breve del sitio"
                  />
                </div>

                <div class="mb-3">
                  <label for="city" class="form-label">
                    <i class="bi bi-geo-alt me-1"></i>Ciudad
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="city"
                    name="city"
                    required
                    placeholder="Ingrese la ciudad"
                  />
                </div>

                <div class="mb-3">
                  <label for="province" class="form-label">
                    <i class="bi bi-map me-1"></i>Provincia
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="province"
                    name="province"
                    required
                    placeholder="Ingrese la provincia"
                  />
                </div>

                <div class="mb-3">
                  <label for="location" class="form-label">
                    <i class="bi bi-pin-map me-1"></i>Ubicación Geográfica
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="location"
                    name="location"
                    required
                    placeholder="Ingrese coordenadas o detalles de ubicación"
                    hidden
                  />
                  <br />
                  <!-- MAPA -->
                  <!-- Inputs ocultos para guardar coordenadas -->
                  <input type="hidden" id="lat" name="lat" />
                  <input type="hidden" id="lng" name="lng" />

                  <label>Selecciona la ubicación en el mapa:</label>
                  <div id="map"></div>
                  <br />
                  <!-- FIN MAPA -->
                </div>
              </div>

              <!-- Segunda columna -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label for="conservation_status" class="form-label">
                    <i class="bi bi-shield-check me-1"></i>Estado de
                    Conservación
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="conservation_status"
                    name="conservation_status"
                    required
                    placeholder="Estado actual de conservación"
                  />
                </div>

                <div class="mb-3">
                  <label for="year_declared" class="form-label">
                    <i class="bi bi-calendar-event me-1"></i>Año de Declaración
                  </label>
                  <input
                    type="number"
                    class="form-control"
                    id="year_declared"
                    name="year_declared"
                    required
                    min="1800"
                    max="2024"
                    placeholder="Año en que fue declarado"
                  />
                </div>

                <div class="mb-3">
                  <label for="category" class="form-label">
                    <i class="bi bi-tags me-1"></i>Categoría
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="category"
                    name="category"
                    required
                    placeholder="Categoría del sitio"
                  />
                </div>

                <div class="mb-3">
                  <label for="registration_date" class="form-label">
                    <i class="bi bi-calendar3 me-1"></i>Fecha de Registro
                  </label>
                  <input
                    type="date"
                    class="form-control"
                    id="registration_date"
                    name="registration_date"
                    required
                  />
                </div>

                <div class="mb-3">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="visibility"
                      name="visibility"
                      value="true"
                    />
                    <label class="form-check-label" for="visibility">
                      <i class="bi bi-eye me-1"></i>Hacer sitio visible al
                      público
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Descripción detallada en toda la fila -->
            <div class="row">
              <div class="col-12">
                <div class="mb-4">
                  <label for="description" class="form-label">
                    <i class="bi bi-journal-text me-1"></i>Descripción Detallada
                  </label>
                  <textarea
                    class="form-control"
                    id="description"
                    name="description"
                    required
                    rows="4"
                    placeholder="Proporcione una descripción detallada del sitio histórico..."
                  ></textarea>
                </div>
              </div>
            </div>

            <!-- Botones de acción -->
            <div class="row">
              <div class="col-12">
                <div class="d-flex gap-2 justify-content-end">
                  <a
                    href="{{ url_for('sites.list_sites') }}"
                    class="btn btn-outline-secondary"
                  >
                    <i class="bi bi-arrow-left me-1"></i>Cancelar
                  </a>
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Crear Sitio
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Inicializar mapa
  var map = L.map("map").setView([-34.6037, -58.3816], 13); // Buenos Aires de ejemplo

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
  }).addTo(map);

  var marker;

  // Evento click en mapa
  map.on("click", function (e) {
    var lat = e.latlng.lat;
    var lng = e.latlng.lng;

    if (marker) {
      map.removeLayer(marker);
    }
    marker = L.marker([lat, lng]).addTo(map);

    // Guardar valores en los inputs ocultos
    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;
  });
</script>
{% endblock %}
