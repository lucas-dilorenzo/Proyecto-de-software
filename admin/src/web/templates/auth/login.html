{% extends "layout.html" %} {% block title %}Sitios Históricos - Iniciar
Sesión{% endblock %} {%block head %} {{ super() }} {% endblock %} {%block body%}
<div class="container" id="login">
  <div class="d-flex justify-content-center h-100">
    <div class="card">
      <div class="card-header" style="background-color: black">
        <h3 class="titulo_seccion">Iniciar Sesion</h3>
      </div>
      <div class="card-body">
        <form action="{{ url_for('auth.login') }}" method="POST">
          <!-- Token CSRF-->
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <input
            name="email"
            placeholder="Correo"
            class="input-style p-1"
            required
          />
          <input
            type="password"
            name="password"
            placeholder="Clave"
            class="input-style p-1"
            required
          />
          <div class="text-center mt-4">
            <button type="submit" class="btn btn-secondary mx-3">
              <b>Iniciar Sesión</b>
            </button>
            <a class="btn btn-secondary mx-3" href="{{ url_for('home') }}"
              ><b>Cancelar</b></a
            >
          </div>
        </form>
        <hr />
      </div>
    </div>
  </div>
</div>
{% endblock %}
