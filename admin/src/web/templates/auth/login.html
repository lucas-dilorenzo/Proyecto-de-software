<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitios Históricos - Iniciar Sesión</title>

    <!-- Fuentes y estilos -->
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      body {
        font-family: Quicksand, sans-serif;
        background-color: #004c82 ;
        color: #ffffff;
      }
    </style>
  </head>

  <body class="min-vh-100 d-flex align-items-center py-4">
    <main class="container">
      <h1 class="mb-4 text-center">Iniciar Sesión</h1>
      <!-- Contenido original del template (sin cambios) -->
      <div class="container my-4">
        <div class="row justify-content-center">
          <div class="col-lg-5 col-md-6 col-sm-8">
            <!--  -->
            <!-- Mensajes flash para mostrar notificaciones -->
            <div
              id="flash-container"
              class="flash-container mb-4"
              aria-live="polite"
              aria-atomic="true"
            >
              {% with msgs = get_flashed_messages(with_categories=True) %} {% if
              msgs %} {% for cat, m in msgs %} {% set bs_class = 'info' if
              cat=='message' else cat %}
              <div
                class="alert alert-{{ bs_class }} alert-dismissible fade show"
                role="alert"
              >
                {{ m }}
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                  aria-label="Cerrar"
                ></button>
              </div>
              {% endfor %} {% endif %} {% endwith %}
            </div>
            <!-- CARD PRINCIPAL  -->
            <div class="card shadow-sm border-0 rounded-0 bg-white">
              <div class="card-body">
            <!-- <div class="card shadow-sm border-0 rounded-3">
              <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">
                  <i class="bi bi-box-arrow-in-right me-2"></i>
                  Acceso al Sistema
                </h4>
              </div>
              <div class="card-body p-4"> -->
                <form
                  action="{{ url_for('auth.login') }}"
                  method="POST"
                  class="needs-validation"
                  novalidate
                >
                  <!-- Token CSRF -->
                  <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token() }}"
                  />

                  <!-- Campo Email -->
                  <div class="mb-3">
                    <label for="email" class="form-label"
                      >Correo Electrónico</label
                    >
                    <input
                      type="email"
                      id="email"
                      name="email"
                      class="form-control"
                      placeholder="Ingrese su correo electrónico"
                      required
                      autocomplete="email"
                    />
                    <div class="invalid-feedback">
                      Por favor ingrese un correo electrónico válido.
                    </div>
                  </div>

                  <!-- Campo Password -->
                  <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="password"
                      name="password"
                      class="form-control"
                      placeholder="Ingrese su contraseña"
                      required
                      autocomplete="current-password"
                    />
                    <div class="invalid-feedback">
                      Por favor ingrese su contraseña.
                    </div>
                  </div>

                  <!-- Botones -->
                  <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg" style="background-color: #004c82; border: none; border-radius: 0%;">
                      <i class="bi bi-box-arrow-in-right me-2"></i>
                      Iniciar Sesión
                    </button>
                    <!-- <a
                      href="{{ url_for('home') }}"
                      class="btn btn-outline-secondary"
                    >
                      <i class="bi bi-arrow-left me-2"></i>
                      Cancelar
                    </a> -->
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Auto-cierre de alertas después de 4 segundos
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          document
            .querySelectorAll("#flash-container .alert")
            .forEach(function (el) {
              try {
                bootstrap.Alert.getOrCreateInstance(el).close();
              } catch (e) {}
            });
        }, 4000);
      });
    </script>
  </body>
</html>
